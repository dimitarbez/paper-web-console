# Bind to all interfaces by default. Restrict this to a specific LAN IP if you
# want to reduce exposure. This plugin is HTTP-only and should remain on a trusted network.
bindAddress: "0.0.0.0"
port: 28765

# Number of lines to preload from logs/latest.log when the plugin starts.
historyLimit: 250

# Session and setup timing controls.
sessionHours: 12
setupTokenTtlMinutes: 30
loginRateLimitWindowMinutes: 15
loginRateLimitMaxAttempts: 5

ui:
  showTimestamps: true
  maxBufferedLines: 2000
  defaultWrapMode: true
