<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Console | Paper Web Console</title>
    <meta name="description" content="Browser-based Paper server console with live logs and authenticated command access on a trusted network.">
    <meta name="theme-color" content="#141311">
    <meta name="robots" content="noindex,nofollow">
    <meta property="og:title" content="Paper Web Console">
    <meta property="og:description" content="Live Paper server console access in a polished browser terminal for trusted LAN use.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/favicon.svg">
    <meta name="twitter:card" content="summary">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="page console-page">
    <div class="app-shell" data-panel-open="false">
        <button id="panelToggle" class="mobile-panel-toggle" type="button" aria-label="Toggle status panel" aria-controls="statusRail" aria-expanded="false">Status</button>
        <button id="panelBackdrop" class="panel-backdrop hidden" type="button" aria-label="Close status panel"></button>

        <main class="terminal-layout">
            <section class="terminal-panel">
                <div class="terminal-header">
                    <div class="brand-lockup">
                        <img class="brand-mark" src="/assets/favicon.svg" alt="" aria-hidden="true">
                        <div>
                        <p class="eyebrow">Paper Web Console</p>
                        <h1>Server Console</h1>
                        </div>
                    </div>
                    <div class="terminal-indicators">
                        <span id="connectionBadge" class="badge badge-live">Connecting</span>
                        <span id="scrollBadge" class="badge badge-muted hidden">Scroll Paused</span>
                    </div>
                </div>

                <div id="consoleOutput" class="console-output" role="log" aria-live="polite"></div>

                <form id="commandForm" class="prompt-bar">
                    <label class="prompt-shell" for="commandInput">
                        <span class="prompt-token">console</span>
                        <span class="prompt-separator">&gt;</span>
                    </label>
                    <textarea
                        id="commandInput"
                        class="prompt-input"
                        rows="1"
                        autocomplete="off"
                        autocapitalize="off"
                        spellcheck="false"
                        placeholder="Type a Minecraft server command"
                    ></textarea>
                    <button id="sendButton" class="primary-button" type="submit">Run</button>
                </form>
                <p id="inlineStatus" class="inline-status">Bootstrapping session…</p>
            </section>

            <aside id="statusRail" class="status-rail">
                <section class="rail-card">
                    <p class="eyebrow">Connection</p>
                    <div class="rail-row">
                        <span class="rail-label">Endpoint</span>
                        <span id="endpointValue" class="rail-value">-</span>
                    </div>
                    <div class="rail-row">
                        <span class="rail-label">Server</span>
                        <span id="serverValue" class="rail-value">-</span>
                    </div>
                    <div class="rail-row">
                        <span class="rail-label">Session</span>
                        <span id="sessionValue" class="rail-value">-</span>
                    </div>
                    <div class="rail-row">
                        <span class="rail-label">Buffered</span>
                        <span id="bufferValue" class="rail-value">-</span>
                    </div>
                </section>

                <section class="rail-card">
                    <p class="eyebrow">Actions</p>
                    <div class="rail-actions">
                        <button id="reconnectButton" class="secondary-button" type="button">Reconnect</button>
                        <button id="clearButton" class="secondary-button" type="button">Clear Local View</button>
                        <button id="wrapButton" class="secondary-button" type="button">Toggle Wrap</button>
                        <button id="logoutButton" class="secondary-button" type="button">Logout</button>
                    </div>
                </section>

                <section class="rail-card rail-note">
                    <p class="eyebrow">Input</p>
                    <p>Enter sends a command. Shift+Enter keeps a multiline paste intact. Use Up and Down to recall command history.</p>
                </section>
            </aside>
        </main>
    </div>

    <div id="toastStack" class="toast-stack" aria-live="polite"></div>
    <script type="module" src="/assets/console.js"></script>
</body>
</html>
